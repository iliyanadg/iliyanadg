name: scrape-of

on:
  schedule:
    - cron: "*/10 * * * *"     # ogni 10 minuti
  workflow_dispatch:

# Evita run sovrapposti
concurrency:
  group: scrape-of
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # serve per fare pull --rebase e push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm i

      - name: Install Playwright (with deps)
        run: npx playwright install --with-deps

      - name: Run scraper
        env:
          TARGET_USERNAME: iliyanadg
          OF_COOKIE: ${{ secrets.OF_COOKIE }}
        run: node scrape.js

      # --- Commit & Push senza action esterna ---
      - name: Commit stats.json
        env:
          BRANCH: main
        run: |
          set -eux
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "$BRANCH" || true
          git add stats.json
          # se non ci sono cambi, non fallire il job
          git commit -m "update stats [skip ci]" || exit 0
          git push origin HEAD:"$BRANCH"


