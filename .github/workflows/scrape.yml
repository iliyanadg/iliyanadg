name: scrape-of

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-of
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm i

      - name: Install Playwright (with deps)
        run: npx playwright install --with-deps

      - name: Run scraper
        env:
          TARGET_USERNAME: iliyanadg
          OF_COOKIE: ${{ secrets.OF_COOKIE }}
        run: node ./scrape.cjs

      # === Artifact di debug (consigliato) ===
      - name: Upload debug artifacts
        if: always()                     # esegui anche se lo scraping fallisce
        uses: actions/upload-artifact@v4
        with:
          name: of-debug-${{ github.run_number }}
          path: |
            debug-profile.png
            debug-profile.html
          if-no-files-found: ignore
          retention-days: 5

      # (Opzionale) carica anche lo stats.json come artifact
      - name: Upload stats.json (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ github.run_number }}
          path: stats.json
          if-no-files-found: ignore

      - name: Commit stats.json
        env:
          BRANCH: main
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git -c rebase.autostash=true pull --rebase origin "$BRANCH" || true
          git add stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "update stats [skip ci]"
          git push origin HEAD:"$BRANCH"






