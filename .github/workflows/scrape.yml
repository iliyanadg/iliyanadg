name: scrape-of

on:
  schedule:
    - cron: "*/10 * * * *"   # ogni 10 minuti
  workflow_dispatch:

# Evita run sovrapposti
concurrency:
  group: scrape-of
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # serve per poter fare pull --rebase

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm i

      - name: Install Playwright (with deps)
        run: npx playwright install --with-deps

      - name: Run scraper
        env:
          TARGET_USERNAME: iliyanadg
          OF_COOKIE: ${{ secrets.OF_COOKIE }}
        run: node scrape.js

      - name: Commit stats
        uses: EndBug/add-and-commit@v9
        with:
          add: stats.json
          message: "update stats"
          pull: "--rebase --autostash"   # <— risolve il non-fast-forward
          push: true

